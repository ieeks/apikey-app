<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Isla — API Key App Wireframes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: #2A2415; }
    #root { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">

// ── Wireframe tokens — warm linen palette ─────────────────────
const W = {
  bg:       '#E8E3D8',   // warm linen background
  surface:  '#F0EDE6',   // card / input surface
  border:   '#D0C9BC',   // subtle warm border
  text:     '#28200F',   // dark warm brown
  textSec:  '#8A7A66',   // muted warm brown
  ph:       '#C8C2B6',   // placeholder fill
  accent:   '#C4583A',   // terracotta CTA
};

// ── Shared primitives ─────────────────────────────────────────

function WFBox({ w='100%', h=40, r=8, color=W.ph, style={} }) {
  return <div style={{ width: w, height: h, borderRadius: r, background: color, flexShrink: 0, ...style }} />;
}

function WFText({ children, size=14, weight=400, color=W.text, style={} }) {
  return <div style={{ fontSize: size, fontWeight: weight, color, lineHeight: 1.45, ...style }}>{children}</div>;
}

function WFBtn({ label, full=false, outline=false, small=false, style={} }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      width: full ? '100%' : 'auto',
      height: small ? 38 : 50,
      borderRadius: 12,
      background: outline ? 'transparent' : W.accent,
      border: outline ? `1.5px solid ${W.border}` : 'none',
      color: outline ? W.text : '#FFF8F0',
      fontSize: small ? 13 : 15,
      fontWeight: 600,
      cursor: 'pointer',
      padding: full ? '0' : '0 20px',
      flexShrink: 0,
      ...style,
    }}>{label}</div>
  );
}

function WFInput({ label, placeholder }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
      {label && <WFText size={12} weight={600} color={W.textSec} style={{ letterSpacing: 0.4 }}>{label}</WFText>}
      <div style={{
        display: 'flex', alignItems: 'center',
        height: 48, borderRadius: 12,
        border: `1.5px solid ${W.border}`,
        background: W.surface,
        padding: '0 14px',
      }}>
        <WFText size={14} color={W.textSec}>{placeholder}</WFText>
      </div>
    </div>
  );
}

function WFTag({ label, bg='#F0F0F0', color='#666' }) {
  return (
    <div style={{
      display: 'inline-flex', alignItems: 'center',
      padding: '2px 8px', borderRadius: 20,
      background: bg, color,
      fontSize: 10, fontWeight: 700, letterSpacing: 0.4,
    }}>{label}</div>
  );
}

function Screen({ children, scrollable=true }) {
  return (
    <div style={{
      flex: 1,
      overflowY: scrollable ? 'auto' : 'hidden',
      overflowX: 'hidden',
      background: W.bg,
      display: 'flex',
      flexDirection: 'column',
      position: 'relative',
    }}>{children}</div>
  );
}

function CopiedToast({ visible }) {
  return (
    <div style={{
      position: 'absolute',
      bottom: 28,
      left: '50%',
      transform: `translateX(-50%) translateY(${visible ? 0 : 20}px)`,
      opacity: visible ? 1 : 0,
      transition: 'opacity 0.22s ease, transform 0.22s ease',
      pointerEvents: 'none',
      zIndex: 100,
      display: 'flex', alignItems: 'center', gap: 8,
      background: W.text,
      color: '#FFF8F0',
      padding: '11px 22px',
      borderRadius: 99,
      fontSize: 15,
      fontWeight: 600,
      whiteSpace: 'nowrap',
      boxShadow: '0 4px 20px rgba(0,0,0,0.22)',
    }}>
      <svg width="17" height="17" viewBox="0 0 17 17" fill="none">
        <circle cx="8.5" cy="8.5" r="8" stroke="#FFF8F0" strokeWidth="1.5"/>
        <path d="M5 8.5l2.5 2.5 4.5-5" stroke="#FFF8F0" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
      Copied
    </div>
  );
}

function useCopied() {
  const [visible, setVisible] = React.useState(false);
  const timerRef = React.useRef(null);
  const trigger = React.useCallback(() => {
    setVisible(true);
    clearTimeout(timerRef.current);
    timerRef.current = setTimeout(() => setVisible(false), 1600);
  }, []);
  return [visible, trigger];
}

function SRow({ name, env, last=false, onCopy, selectable=false, selected=false, onSelect }) {
  const envBg = { prod: '#FFEBEE', staging: '#FFF8E1', dev: '#E8F5E9' };
  return (
    <div style={{
      padding: '13px 16px',
      borderBottom: last ? 'none' : `1px solid ${W.border}`,
      display: 'flex', alignItems: 'center', gap: 10,
      background: selected ? 'rgba(196,88,58,0.07)' : 'transparent',
      transition: 'background 0.15s',
    }}>
      {selectable && (
        <div onClick={onSelect} style={{
          width: 22, height: 22, borderRadius: 11, flexShrink: 0,
          border: `1.5px solid ${selected ? W.accent : W.border}`,
          background: selected ? W.accent : 'transparent',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          cursor: 'pointer', transition: 'all 0.15s',
        }}>
          {selected && <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
            <path d="M1 4l3 3.5L10 1" stroke="#FFF8F0" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>}
        </div>
      )}
      <div style={{ flex: 1 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 7, marginBottom: 3 }}>
          <WFText size={14} weight={500}>{name}</WFText>
          {env && <WFTag label={env} bg={envBg[env]||W.ph} color="#555" />}
        </div>
        <WFText size={12} color={W.textSec}>{'•'.repeat(13)}</WFText>
      </div>
      {!selectable && (
        <div onClick={onCopy} style={{
          padding: '5px 11px', borderRadius: 8,
          border: `1px solid ${W.border}`,
          fontSize: 12, fontWeight: 500, color: W.textSec,
          cursor: 'pointer',
        }}>Copy</div>
      )}
    </div>
  );
}

// ── Bulk Delete Confirmation Sheet ────────────────────────────
function DeleteSheet({ count, onCancel }) {
  return (
    <div style={{
      position: 'absolute', inset: 0, background: 'rgba(40,32,15,0.45)',
      display: 'flex', flexDirection: 'column', justifyContent: 'flex-end',
      zIndex: 50, borderRadius: 'inherit',
    }}>
      <div style={{
        background: W.bg, borderRadius: '22px 22px 0 0',
        borderTop: `1px solid ${W.border}`,
        padding: '12px 16px 36px',
        display: 'flex', flexDirection: 'column', gap: 16,
      }}>
        <div style={{ display: 'flex', justifyContent: 'center', paddingBottom: 2 }}>
          <WFBox w={36} h={4} r={2} color={W.ph} />
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
          <WFText size={18} weight={700}>Delete {count} Secret{count !== 1 ? 's' : ''}?</WFText>
          <WFText size={13} color={W.textSec}>This action cannot be undone.</WFText>
        </div>
        {/* Security warning card */}
        <div style={{
          padding: '14px 16px', background: W.surface,
          borderRadius: 14, border: `1.5px dashed ${W.border}`,
          display: 'flex', gap: 12, alignItems: 'flex-start',
        }}>
          <div style={{
            width: 32, height: 32, borderRadius: 10,
            background: 'rgba(196,88,58,0.12)',
            display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
          }}>
            <svg width="16" height="18" viewBox="0 0 16 18" fill="none">
              <path d="M8 1L1 4.5V9c0 4 3.1 7.4 7 8 3.9-.6 7-4 7-8V4.5L8 1z" stroke={W.accent} strokeWidth="1.5" strokeLinejoin="round"/>
              <path d="M8 6v4M8 12v1" stroke={W.accent} strokeWidth="1.5" strokeLinecap="round"/>
            </svg>
          </div>
          <div>
            <WFText size={13} weight={700} style={{ marginBottom: 4 }}>Security Protocol</WFText>
            <WFText size={12} color={W.textSec} style={{ lineHeight: 1.6 }}>
              Deleting these secrets is permanent. Ensure you have backups or have rotated these keys in your service dashboards before confirming.
            </WFText>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          <div style={{ flex: 1 }} onClick={onCancel}>
            <WFBtn label="Cancel" full outline />
          </div>
          <div style={{
            flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center',
            height: 50, borderRadius: 12, background: '#C4583A',
            color: '#FFF8F0', fontSize: 15, fontWeight: 600, cursor: 'pointer',
          }}>Delete</div>
        </div>
      </div>
    </div>
  );
}

// ── LOCK SCREENS ──────────────────────────────────────────────

function LockBiometric() {
  return (
    <Screen scrollable={false}>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 28, padding: '0 40px' }}>
        <WFBox w={64} h={64} r={18} style={{ border: `1.5px solid ${W.border}` }} />
        <div style={{ textAlign: 'center', display: 'flex', flexDirection: 'column', gap: 8 }}>
          <WFText size={24} weight={700} style={{ textAlign: 'center' }}>Isla</WFText>
          <WFText size={15} color={W.textSec} style={{ textAlign: 'center' }}>Tap to unlock with Face ID</WFText>
        </div>
        <div style={{
          width: 64, height: 64, borderRadius: 32,
          border: `1.5px solid ${W.border}`, background: W.surface,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <WFBox w={26} h={26} r={5} />
        </div>
      </div>
      <div style={{ padding: '0 28px 36px', display: 'flex', flexDirection: 'column', gap: 10 }}>
        <WFBtn label="Use Passcode instead" outline full />
      </div>
    </Screen>
  );
}

function LockPinPad() {
  const filled = [true, true, false, false, false, false];
  const keys = ['1','2','3','4','5','6','7','8','9','','0','⌫'];
  return (
    <Screen scrollable={false}>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 28, padding: '0 28px' }}>
        <WFText size={17} weight={600}>Enter Passcode</WFText>
        <div style={{ display: 'flex', gap: 14 }}>
          {filled.map((f, i) => (
            <div key={i} style={{
              width: 12, height: 12, borderRadius: 6,
              background: f ? W.text : 'transparent',
              border: `1.5px solid ${W.text}`,
            }} />
          ))}
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 10, width: '100%' }}>
          {keys.map((k, i) => (
            <div key={i} style={{
              height: 54, borderRadius: 13,
              background: k ? W.surface : 'transparent',
              border: k ? `1.5px solid ${W.border}` : 'none',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: 20, fontWeight: 400, color: W.text,
            }}>{k}</div>
          ))}
        </div>
      </div>
    </Screen>
  );
}

function LockPassphrase() {
  return (
    <Screen scrollable={false}>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 28, padding: '0 28px' }}>
        <WFBox w={56} h={56} r={16} style={{ border: `1.5px solid ${W.border}` }} />
        <WFText size={22} weight={700}>Isla</WFText>
        <div style={{ width: '100%', display: 'flex', flexDirection: 'column', gap: 12 }}>
          <WFInput label="PASSPHRASE" placeholder="Enter your passphrase…" />
          <WFBtn label="Unlock" full />
          <WFText size={13} color={W.textSec} style={{ textAlign: 'center' }}>or unlock with Face ID</WFText>
        </div>
      </div>
    </Screen>
  );
}

function LockMinimal() {
  return (
    <Screen scrollable={false}>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16 }}>
        <WFBox w={88} h={88} r={26} style={{ border: `2px solid ${W.border}` }} />
        <WFText size={26} weight={700} style={{ textAlign: 'center' }}>Isla</WFText>
        <WFText size={14} color={W.textSec} style={{ textAlign: 'center', maxWidth: 180, lineHeight: 1.6 }}>
          Your secrets are locked. Touch to open.
        </WFText>
        <div style={{
          marginTop: 16, width: 56, height: 56, borderRadius: 28,
          background: W.accent, display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <WFBox w={22} h={22} r={4} color="#fff" />
        </div>
      </div>
    </Screen>
  );
}

// ── WORKSPACE LIST ────────────────────────────────────────────

function WorkspaceGrid() {
  const ws = [{ name:'Personal', count:12 },{ name:'Work', count:8 },{ name:'Side Projects', count:5 }];
  return (
    <Screen>
      <IOSNavBar title="Workspaces" />
      <div style={{ padding: '12px 16px 24px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
        {ws.map((w, i) => (
          <div key={i} style={{
            borderRadius: 16, border: `1.5px solid ${W.border}`,
            background: W.bg, padding: '16px',
            display: 'flex', flexDirection: 'column', gap: 10, minHeight: 108,
          }}>
            <WFBox w={32} h={32} r={9} />
            <div>
              <WFText size={14} weight={600}>{w.name}</WFText>
              <WFText size={12} color={W.textSec}>{w.count} secrets</WFText>
            </div>
          </div>
        ))}
        <div style={{
          borderRadius: 16, border: `1.5px dashed ${W.border}`,
          background: W.surface, minHeight: 108,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          color: W.textSec, fontSize: 24, fontWeight: 300,
        }}>+</div>
      </div>
    </Screen>
  );
}

function WorkspaceList() {
  const ws = ['Personal', 'Work', 'Side Projects', 'Shared Team'];
  return (
    <Screen>
      <IOSNavBar title="Workspaces" />
      <div style={{ padding: '12px 0 24px' }}>
        <IOSList>
          {ws.map((name, i) => (
            <IOSListRow key={i} title={name} detail="8 secrets" chevron isLast={i === ws.length - 1} />
          ))}
        </IOSList>
        <div style={{ padding: '12px 16px' }}>
          <WFBtn label="+ New Workspace" full outline />
        </div>
      </div>
    </Screen>
  );
}

function WorkspaceFlat() {
  const secrets = ['OPENAI_API_KEY','STRIPE_SECRET','AWS_ACCESS_KEY','GITHUB_TOKEN','SENDGRID_KEY'];
  return (
    <Screen>
      <IOSNavBar title="Secrets" />
      <div style={{ padding: '8px 16px 16px' }}>
        <div style={{
          display: 'flex', alignItems: 'center', gap: 8,
          height: 42, borderRadius: 12, background: W.surface,
          padding: '0 14px', marginBottom: 12,
        }}>
          <WFText color={W.textSec} size={14}>Search secrets…</WFText>
        </div>
        <div style={{ border: `1px solid ${W.border}`, borderRadius: 14, overflow: 'hidden' }}>
          {secrets.map((s, i) => <SRow key={i} name={s} last={i === secrets.length - 1} />)}
        </div>
      </div>
    </Screen>
  );
}

function WorkspaceRecent() {
  const recent = ['OPENAI_API_KEY','STRIPE_SECRET'];
  const ws = ['Personal','Work','Side Projects'];
  return (
    <Screen>
      <IOSNavBar title="Workspaces" />
      <div style={{ padding: '8px 16px 24px', display: 'flex', flexDirection: 'column', gap: 20 }}>
        <div>
          <WFText size={11} weight={700} color={W.textSec} style={{ letterSpacing: 0.6, marginBottom: 8 }}>RECENTLY ACCESSED</WFText>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {recent.map((r, i) => (
              <div key={i} style={{
                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                padding: '11px 14px', borderRadius: 12,
                background: W.surface, border: `1px solid ${W.border}`,
              }}>
                <div>
                  <WFText size={13} weight={500}>{r}</WFText>
                  <WFText size={11} color={W.textSec}>Personal · 2h ago</WFText>
                </div>
                <WFBtn label="Copy" small outline />
              </div>
            ))}
          </div>
        </div>
        <div>
          <WFText size={11} weight={700} color={W.textSec} style={{ letterSpacing: 0.6, marginBottom: 8 }}>WORKSPACES</WFText>
          <IOSList>
            {ws.map((name, i) => (
              <IOSListRow key={i} title={name} detail="8 secrets" chevron isLast={i === ws.length - 1} />
            ))}
          </IOSList>
        </div>
      </div>
    </Screen>
  );
}

// ── SECRET LIST ───────────────────────────────────────────────

function SecretsSimple() {
  const items = ['OPENAI_API_KEY','STRIPE_SECRET','AWS_ACCESS_KEY','GITHUB_TOKEN','SENDGRID_KEY'];
  const [copied, triggerCopy] = useCopied();
  const [selecting, setSelecting] = React.useState(false);
  const [selected, setSelected] = React.useState(new Set());
  const [confirming, setConfirming] = React.useState(false);

  const toggle = (i) => setSelected(s => { const n = new Set(s); n.has(i) ? n.delete(i) : n.add(i); return n; });
  const cancelSelect = () => { setSelecting(false); setSelected(new Set()); };

  return (
    <Screen>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 16px 4px' }}>
        <WFText size={22} weight={700}>Work</WFText>
        <div onClick={() => selecting ? cancelSelect() : setSelecting(true)} style={{
          fontSize: 14, fontWeight: 600,
          color: selecting ? W.accent : W.textSec, cursor: 'pointer',
        }}>{selecting ? 'Cancel' : 'Select'}</div>
      </div>
      {selecting && selected.size > 0 && (
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          padding: '8px 16px', background: W.surface,
          borderTop: `1px solid ${W.border}`, borderBottom: `1px solid ${W.border}`,
        }}>
          <WFText size={13} color={W.textSec}>{selected.size} selected</WFText>
          <div onClick={() => setConfirming(true)} style={{
            display: 'flex', alignItems: 'center', gap: 5,
            padding: '6px 14px', borderRadius: 8,
            background: 'rgba(196,88,58,0.1)', border: `1px solid rgba(196,88,58,0.3)`,
            fontSize: 13, fontWeight: 600, color: W.accent, cursor: 'pointer',
          }}>
            <svg width="13" height="14" viewBox="0 0 13 14" fill="none">
              <path d="M1 3.5h11M4.5 3.5V2.5h4v1M5 6v5M8 6v5M2 3.5l.7 8a1 1 0 001 .9h5.6a1 1 0 001-.9l.7-8" stroke={W.accent} strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
            Delete
          </div>
        </div>
      )}
      <div style={{ padding: '8px 0 24px' }}>
        <div style={{ borderTop: `1px solid ${W.border}`, borderBottom: `1px solid ${W.border}`, background: W.bg }}>
          {items.map((s, i) => (
            <SRow key={i} name={s} last={i === items.length - 1}
              onCopy={triggerCopy}
              selectable={selecting}
              selected={selected.has(i)}
              onSelect={() => toggle(i)}
            />
          ))}
        </div>
      </div>
      <CopiedToast visible={copied} />
      {confirming && <DeleteSheet count={selected.size} onCancel={() => setConfirming(false)} />}
    </Screen>
  );
}

function SecretsTagged() {
  const items = [
    { name:'OPENAI_API_KEY', env:'prod' },
    { name:'OPENAI_API_KEY', env:'staging' },
    { name:'STRIPE_SECRET',  env:'prod' },
    { name:'STRIPE_SECRET',  env:'dev' },
    { name:'AWS_ACCESS_KEY', env:'prod' },
  ];
  const [copied, triggerCopy] = useCopied();
  const [selecting, setSelecting] = React.useState(false);
  const [selected, setSelected] = React.useState(new Set());
  const [confirming, setConfirming] = React.useState(false);
  const toggle = (i) => setSelected(s => { const n = new Set(s); n.has(i) ? n.delete(i) : n.add(i); return n; });
  const cancelSelect = () => { setSelecting(false); setSelected(new Set()); };
  return (
    <Screen>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 16px 4px' }}>
        <WFText size={22} weight={700}>Work</WFText>
        <div onClick={() => selecting ? cancelSelect() : setSelecting(true)} style={{ fontSize: 14, fontWeight: 600, color: selecting ? W.accent : W.textSec, cursor: 'pointer' }}>{selecting ? 'Cancel' : 'Select'}</div>
      </div>
      {selecting && selected.size > 0 && (
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '8px 16px', background: W.surface, borderTop: `1px solid ${W.border}`, borderBottom: `1px solid ${W.border}` }}>
          <WFText size={13} color={W.textSec}>{selected.size} selected</WFText>
          <div onClick={() => setConfirming(true)} style={{ display: 'flex', alignItems: 'center', gap: 5, padding: '6px 14px', borderRadius: 8, background: 'rgba(196,88,58,0.1)', border: `1px solid rgba(196,88,58,0.3)`, fontSize: 13, fontWeight: 600, color: W.accent, cursor: 'pointer' }}>
            <svg width="13" height="14" viewBox="0 0 13 14" fill="none"><path d="M1 3.5h11M4.5 3.5V2.5h4v1M5 6v5M8 6v5M2 3.5l.7 8a1 1 0 001 .9h5.6a1 1 0 001-.9l.7-8" stroke={W.accent} strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/></svg>
            Delete
          </div>
        </div>
      )}
      <div style={{ padding: '8px 0 24px' }}>
        <div style={{ borderTop: `1px solid ${W.border}`, borderBottom: `1px solid ${W.border}`, background: W.bg }}>

        </div>
      </div>
      <CopiedToast visible={copied} />
      {confirming && <DeleteSheet count={selected.size} onCancel={() => setConfirming(false)} />}
    </Screen>
  );
}

function SecretsGrouped() {
  const groups = [
    { header: 'AI', items: ['OPENAI_API_KEY','ANTHROPIC_KEY'] },
    { header: 'Payments', items: ['STRIPE_SECRET','PAYPAL_TOKEN'] },
    { header: 'Infrastructure', items: ['AWS_ACCESS_KEY'] },
  ];
  const allItems = groups.flatMap(g => g.items);
  const [copied, triggerCopy] = useCopied();
  const [selecting, setSelecting] = React.useState(false);
  const [selected, setSelected] = React.useState(new Set());
  const [confirming, setConfirming] = React.useState(false);
  const toggle = (key) => setSelected(s => { const n = new Set(s); n.has(key) ? n.delete(key) : n.add(key); return n; });
  const cancelSelect = () => { setSelecting(false); setSelected(new Set()); };
  return (
    <Screen>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 16px 4px' }}>
        <WFText size={22} weight={700}>Work</WFText>
        <div onClick={() => selecting ? cancelSelect() : setSelecting(true)} style={{ fontSize: 14, fontWeight: 600, color: selecting ? W.accent : W.textSec, cursor: 'pointer' }}>{selecting ? 'Cancel' : 'Select'}</div>
      </div>
      {selecting && selected.size > 0 && (
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '8px 16px', background: W.surface, borderTop: `1px solid ${W.border}`, borderBottom: `1px solid ${W.border}` }}>
          <WFText size={13} color={W.textSec}>{selected.size} selected</WFText>
          <div onClick={() => setConfirming(true)} style={{ display: 'flex', alignItems: 'center', gap: 5, padding: '6px 14px', borderRadius: 8, background: 'rgba(196,88,58,0.1)', border: `1px solid rgba(196,88,58,0.3)`, fontSize: 13, fontWeight: 600, color: W.accent, cursor: 'pointer' }}>
            <svg width="13" height="14" viewBox="0 0 13 14" fill="none"><path d="M1 3.5h11M4.5 3.5V2.5h4v1M5 6v5M8 6v5M2 3.5l.7 8a1 1 0 001 .9h5.6a1 1 0 001-.9l.7-8" stroke={W.accent} strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/></svg>
            Delete
          </div>
        </div>
      )}
      <div style={{ padding: '8px 0 24px' }}>
        {groups.map((g, gi) => {
          let idx = groups.slice(0, gi).reduce((a, x) => a + x.items.length, 0);
          return (
            <div key={gi} style={{ marginBottom: 12 }}>
              <WFText size={11} weight={700} color={W.textSec} style={{ padding: '0 16px 6px', letterSpacing: 0.6 }}>{g.header.toUpperCase()}</WFText>
              <div style={{ borderTop: `1px solid ${W.border}`, borderBottom: `1px solid ${W.border}`, background: W.bg }}>
                {g.items.map((s, i) => {
                  const key = `${gi}-${i}`;
                  return <SRow key={key} name={s} last={i === g.items.length - 1} onCopy={triggerCopy} selectable={selecting} selected={selected.has(key)} onSelect={() => toggle(key)} />;
                })}
              </div>
            </div>
          );
        })}
      </div>
      <CopiedToast visible={copied} />
      {confirming && <DeleteSheet count={selected.size} onCancel={() => setConfirming(false)} />}
    </Screen>
  );
}

function AddWizard() {

            <React.Fragment key={i}>
              <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 5 }}>
                <div style={{
                  width: 26, height: 26, borderRadius: 13,
                  background: s.done ? W.text : s.active ? W.text : W.surface,
                  border: `1.5px solid ${s.done || s.active ? W.text : W.border}`,
                  color: s.done || s.active ? '#fff' : W.textSec,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: 11, fontWeight: 700,
                }}>
                  {s.done ? '✓' : i + 1}
                </div>
                <WFText size={10} color={s.active ? W.text : W.textSec} weight={s.active ? 700 : 400}>{s.label}</WFText>
              </div>
              {i < steps.length - 1 && (
                <div style={{ flex: 1, height: 1.5, background: steps[i+1] && (s.done) ? W.text : W.border, margin: '0 4px 14px' }} />

  );
